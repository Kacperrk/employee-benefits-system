services:
  db:
    image: postgres:16-alpine
    container_name: postgres_db
    restart: always
    environment:
      - POSTGRES_USER=admin
      - POSTGRES_PASSWORD=secret
      - POSTGRES_DB=mojadatabaza
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build:
      context: ./Api
      dockerfile: Dockerfile
    container_name: benefit_api
    depends_on:
      - db
    ports:
      - "5000:80"
    environment:
      - ConnectionStrings__DefaultConnection=Host=db;Port=5432;Database=mojadatabaza;Username=admin;Password=secret
      - ASPNETCORE_ENVIRONMENT=Development

volumes:
  postgres_data: