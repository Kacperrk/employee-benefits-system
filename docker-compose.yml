services:
  db:
    image: postgres:16-alpine
    container_name: postgres_db
    restart: always
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: secret
      POSTGRES_DB: mojadatabaza
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build:
      context: ./Api
      dockerfile: Dockerfile
    container_name: benefit_api
    restart: always
    depends_on:
      - db
    ports:
      - "5000:5000" # Zmieniamy z 5000:8080 na 5000:5000
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:5000 # Backend słucha teraz na 5000
      ConnectionStrings__DefaultConnection: Host=db;Port=5432;Database=mojadatabaza;Username=admin;Password=secret

  frontend:
    build:
      context: ./MyFront
      dockerfile: Dockerfile
    container_name: benefit_frontend
    restart: always
    depends_on:
      - backend
    ports:
      - "5173:80"

volumes:
  postgres_data:
